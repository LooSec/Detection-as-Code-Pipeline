id: DET-AWS-005
name: Secrets Manager Bulk Retrieval
description: >
  Catches GetSecretValue calls. On its own a single hit isn't
  interesting — the aggregate threshold (5 in 10min from the same
  principal) is what makes this useful. Normal apps pull one or
  two specific secrets, not the whole store.
severity: high
mitre:
  tactic: credential-access
  technique: T1552
  subtechnique: T1552.005
data_source: cloudtrail
logic:
  event_name: GetSecretValue
  conditions:
    - field: eventName
      operator: eq
      value: "GetSecretValue"
    - field: errorCode
      operator: not_exists
      value: true
  aggregate:
    group_by:
      - userIdentity.arn
    count_threshold: 5
    time_window_minutes: 10
false_positive_guidance: >
  Rotation lambdas and CI/CD pulling deployment secrets will hit this.
  Filter on userAgent containing lambda.amazonaws.com or known
  CI service roles.
references:
  - https://attack.mitre.org/techniques/T1552/005/
response_actions:
  - List which secrets they pulled
  - Check if ListSecrets happened first (enumeration)
  - Rotate anything they touched if it wasn't authorized
